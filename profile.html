<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Diet Diary</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="profile.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="profile.js" defer></script>
</head>
<body>
  <div class="container">
    <a class="btn btn-outline-dark mb-4" href="./dashboard.html">← Back</a>
    
    <div class="card">
      <div class="card-body">
        <h2 class="text-center mb-4">Your Profile</h2>
        <form id="profileForm">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="name" class="form-label">Name</label>
              <input type="text" class="form-control" id="name" required />
            </div>
            <div class="col-md-6">
              <label for="age" class="form-label">Age</label>
              <input type="number" class="form-control" id="age" required />
            </div>
            <div class="col-md-6">
              <label for="sex" class="form-label">Gender</label>
              <select class="form-select" id="sex" required>
                <option disabled selected>Select your gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
              </select>
            </div>
            <div class="col-md-6">
              <label for="weight" class="form-label">Weight (kg)</label>
              <input type="number" class="form-control" id="weight" required />
            </div>
            <div class="col-md-6">
              <label for="height" class="form-label">Height (cm)</label>
              <input type="number" class="form-control" id="height" required />
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 mt-4">Save Profile</button>
        </form>
      </div>
    </div>

    <div class="bmi-section">
      <h4 class="text-center mb-4">Your BMI</h4>
      <div class="bmi-meter">
        <div class="bmi-needle" id="bmiNeedle"></div>
      </div>
      <div class="bmi-scale">
        <span>Underweight</span>
        <span>Normal</span>
        <span>Overweight</span>
        <span>Obese</span>
      </div>
      <p class="mt-3" id="bmiResult">Enter details to calculate BMI.</p>
      <div class="calorie-section" id="calorieResult"></div>
    </div>
  </div>
</body>
</html>
