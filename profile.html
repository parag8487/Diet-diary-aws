<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Diet Diary</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="profile.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="profile.js" defer></script>
</head>
<body>
  <div class="container mt-4">
    <a class="back-btn" href="./dashboard.html">← Back</a>
    <h1 class="page-title">Your Profile</h1>

    <form id="profileForm" class="bg-white rounded shadow-sm">
        <div class="form-group">
            <label for="name" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="name" placeholder="Enter your full name" required />
        </div>
        
        <div class="input-row">
            <div class="form-group">
                <label for="age" class="form-label">Age</label>
                <input type="number" class="form-control" id="age" placeholder="Age" min="1" max="120" required />
            </div>
            <div class="form-group">
                <label for="weight" class="form-label">Weight (kg)</label>
                <input type="number" class="form-control" id="weight" placeholder="Weight" min="1" max="500" step="0.1" required />
            </div>
        </div>
        
        <div class="input-row">
            <div class="form-group">
                <label for="sex" class="form-label">Gender</label>
                <select class="form-select" id="sex" required>
                    <option disabled selected>Select gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="height" class="form-label">Height (cm)</label>
                <input type="number" class="form-control" id="height" placeholder="Height" min="50" max="250" required />
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary w-100">Save Profile</button>
    </form>

    <!-- BMI Meter Section -->
    <div class="bmi-section text-center">
      <h4>BMI Assessment</h4>
      <div class="bmi-meter position-relative mx-auto">
        <div class="bmi-needle" id="bmiNeedle"></div>
      </div>
      <div class="bmi-scale">
        <span>Underweight</span>
        <span>Normal</span>
        <span>Overweight</span>
        <span>Obese</span>
      </div>
      
      <p id="bmiResult">Enter your details above to calculate your BMI</p>
      <div class="calorie-section" id="calorieResult"></div>
    </div>
  </div>
</body>
</html>
