<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(76, 175, 80, 0.1), rgba(129, 199, 132, 0.1)), url('./images/background_image.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .dashboard-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            margin: 20px auto;
            max-width: 1200px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .dashboard-header {
            background: linear-gradient(90deg, #66bb6a 0%, #81c784 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .dashboard-header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .dashboard-header p {
            margin: 10px 0 0 0;
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .action-buttons {
            background: #f8f9fa;
            padding: 30px;
            border-bottom: 1px solid #e9ecef;
        }
        
        .btn-custom {
            border-radius: 15px;
            padding: 15px 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            border: none;
            margin: 10px;
            min-width: 200px;
            position: relative;
            overflow: hidden;
        }
        
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .btn-food {
            background: linear-gradient(45deg, #ef5350, #e53935);
            color: white;
        }
        
        .btn-chatbot {
            background: linear-gradient(45deg, #66bb6a, #4caf50);
            color: white;
        }
        
        .btn-custom i {
            margin-right: 10px;
        }
        
        .table-container {
            padding: 30px;
        }
        
        .table {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }
        
        .table thead {
            background: linear-gradient(90deg, #66bb6a 0%, #81c784 100%);
            color: white;
        }
        
        .table thead th {
            border: none;
            padding: 20px 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .table tbody tr {
            transition: all 0.3s ease;
        }
        
        .table tbody tr:hover {
            background-color: #e8f5e8;
            transform: scale(1.01);
        }
        
        .table tbody td {
            padding: 15px;
            border: none;
            border-bottom: 1px solid #e9ecef;
        }
        
        .btn-action {
            border-radius: 20px;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 30px;
            background: #f8f9fa;
        }
        
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            border-left: 4px solid #66bb6a;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
            border-left-color: #4caf50;
        }
        
        .stat-card i {
            font-size: 3rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #66bb6a, #4caf50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #388e3c;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #689f38;
            font-size: 1.1rem;
            font-weight: 500;
        }
        
        .table-container h3 {
            color: #388e3c;
            font-weight: 600;
        }
        
        .table-container h3 i {
            color: #66bb6a;
            margin-right: 10px;
        }
        
        @media (max-width: 768px) {
            .dashboard-header h1 {
                font-size: 2rem;
            }
            
            .btn-custom {
                min-width: 150px;
                padding: 12px 20px;
            }
            
            .stats-cards {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .dashboard-header, .action-buttons, .stats-cards, .table-container {
                width: 98% !important;
                padding: 10px !important;
                margin: 10px auto !important;
            }
            .action-buttons {
                flex-direction: column !important;
                gap: 10px !important;
            }
            .stats-cards {
                grid-template-columns: 1fr !important;
                gap: 10px !important;
            }
            .stat-card {
                width: 100% !important;
                margin: 8px 0 !important;
                padding: 10px !important;
            }
            .table {
                font-size: 1rem !important;
            }
            .btn-custom {
                width: 100% !important;
                margin: 8px 0 !important;
            }
        }
        
        @media (max-width: 480px) {
            .dashboard-header h1 {
                font-size: 1.3rem !important;
            }
            .stat-label, .stat-number {
                font-size: 1rem !important;
            }
            .table {
                font-size: 0.95rem !important;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
      
        <div class="dashboard-header">
            <h1><i class="fas fa-user-shield"></i> Admin Dashboard</h1>
            <p>Manage your Diet Diary application efficiently</p>
        </div>
        
        <div class="action-buttons text-center">
            <a href="./browse_food.html" class="btn btn-custom btn-food">
                <i class="fas fa-utensils"></i> Manage Food List
            </a>
            <a href="./chatbot.html" class="btn btn-custom btn-chatbot">
                <i class="fas fa-robot"></i> AI Assistant
            </a>
        </div>
        
        
        <div class="stats-cards">
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <div class="stat-number" id="totalCustomers">0</div>
                <div class="stat-label">Total Customers</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-utensils"></i>
                <div class="stat-number" id="totalFoods">0</div>
                <div class="stat-label">Food Items</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-clock"></i>
                <div class="stat-number" id="activeUsers">0</div>
                <div class="stat-label">Active Users</div>
            </div>
        </div>
        
        
        <div class="table-container">
            <h3 class="mb-4"><i class="fas fa-table"></i> Customer Management</h3>
            <div id="customersTable">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th><i class="fas fa-user"></i> Username</th>
                            <th><i class="fas fa-calendar-alt"></i> Last Login</th>
                            <th><i class="fas fa-cogs"></i> Actions</th>
                        </tr>
                    </thead>
                    <tbody id="customerRows">
                       
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin_dashboard.js"></script>
</body>
</html>
