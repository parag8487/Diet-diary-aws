<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Diet Diary</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0F172A;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: white;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 51, 102, 0.1) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(33, 212, 253, 0.1) 0%, transparent 40%);
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        h2 {
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(to right, #FF3366, #B721FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            margin-bottom: 20px;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #FF3366;
            color: white;
            box-shadow: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #FF3366 0%, #B721FF 100%);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .signup-link {
            text-align: center;
            font-size: 0.9rem;
            color: #94A3B8;
        }
        .signup-link a {
            color: #FF3366;
            text-decoration: none;
            font-weight: 600;
        }
        .admin-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #64748B;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .admin-link:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Welcome Back</h2>
        <form id="loginForm">
            <input type="text" id="username" class="form-control" placeholder="Username" required>
            <input type="password" id="password" class="form-control" placeholder="Password" required>
            <button type="submit" class="btn btn-primary">Login</button>
            <div class="signup-link">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
            <a href="admin_login.html" class="admin-link">Administrator Login</a>
        </form>
        <div id="error-message" class="text-danger text-center mt-3 small"></div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
