<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Diet Diary</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            font-family: 'Outfit', sans-serif;
            color: #f8fafc;
            min-height: 100vh;
        }
        .container { max-width: 800px; padding-top: 50px; }
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .form-label { color: #94a3b8; font-weight: 500; margin-bottom: 8px; }
        .form-control, .form-select {
            background: rgba(15, 23, 42, 0.5) !important;
            border: 1px solid var(--glass-border) !important;
            color: white !important;
            border-radius: 12px;
            padding: 12px;
        }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-glow); }
        .btn-save {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        .btn-save:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--primary-glow); }
        .bmi-preview {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 30px;
            margin-top: 40px;
            text-align: center;
            border: 1px solid var(--glass-border);
        }
        .nav-back { color: #94a3b8; text-decoration: none; display: inline-flex; align-items: center; margin-bottom: 20px; transition: color 0.3s; }
        .nav-back:hover { color: white; }
    </style>
</head>
<body>
    <div class="container">
        <a href="./dashboard.html" class="nav-back">← Back to Dashboard</a>
        <div class="glass-card">
            <h1 class="mb-5 fw-bold" style="background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Your Profile</h1>
            <form id="profileForm">
                <div class="mb-4">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name" required>
                </div>
                <div class="row mb-4">
                    <div class="col">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control" id="age" required>
                    </div>
                    <div class="col">
                        <label class="form-label">Weight (kg)</label>
                        <input type="number" step="0.1" class="form-control" id="weight" required>
                    </div>
                </div>
                <div class="row mb-4">
                    <div class="col">
                        <label class="form-label">Gender</label>
                        <select class="form-select" id="sex">
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <div class="col">
                        <label class="form-label">Height (cm)</label>
                        <input type="number" class="form-control" id="height" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-save w-100">Update Profile Details</button>
            </form>

            <div class="bmi-preview" id="bmiSection">
                <h4 class="mb-3 text-secondary">Quick Stats</h4>
                <div class="display-5 fw-bold" id="bmiValue">--</div>
                <div class="text-secondary" id="bmiResult">Complete your profile to see your BMI</div>
            </div>
        </div>
    </div>
    <script src="js/profile.js" defer></script>
</body>
</html>
